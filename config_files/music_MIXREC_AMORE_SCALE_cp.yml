setting:
  data: amazon_music # Dataset
  gpu_id: 1 # GPU_ID
  baseline: BPRMF # Base model
  wrapper: AMORE_SCALE # Multi-Objective Method
  epochs: 500 # Number of epochs
  validation_rate: 10 # Period of evaluation during training
  validation_metric: ndcg@20 # Metric of evaluation during training
  batch_size: 2048 # Batch size
hyperparameters:
  dim: [64]
  lr: [0.005, 0.001]
  l_2: [0.0001]
  layers: [3]
  ssl_lambda: [0.0, 0.01, 0.1, 1]
  mix_alpha: [0.1]
  temperature: [0.2]
  mode: [rpm] # Which loss to use
  atk: [{atk_cons: 20, atk_prov: 20}] # Cutoff when computing approximated metrics
  ranker: [AIMLE]
  scale: [0.25, 0.5, 0.75, 0.95]
  seed: [42]
  patience: [3]



